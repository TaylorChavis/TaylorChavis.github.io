<!--input types -->
<div class="container">

<h2>Payment Information</h2>
    <form action="process-card.php" method="post">
        <fieldset>
            <!-- data lists -->
            <select id="ccard" name="creditcard" required>
                <option pattern="" value="">Credit Card Type</option>
                <option value="amex">American Express</option>
                <option value="disc">Discover</option>
                <option value="master">MasterCard</option>
                <option value="visa">Visa</option>
            </select>
            <label for="cname">Name</label>
            <input id="cname" name="cardname" type="text" required />
            <label for="cnum">Card Number</label>
            <!-- added regex pattern and required field for the cardnumber -->
            <input type="text" name="cardnumber" id="cnum"
                pattern="^(?:4[0-9]{12}(?:[0-9]{3})?|[25][1-7][0-9]{14}|6(?:011|5[0-9][0-9])[0-9]{12}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|(?:2131|1800|35\d{3})\d{11})$"
                required />
            <!-- make the selection requried, and add the months options with their values -->
            <select name="cardmonth" id="month" required>
                <option value=" ">Month</option>
                <option value="January">January (01)</option>
                <option value="February">February (02)</option>
                <option value="March">March (03)</option>
                <option value="April">April (04)</option>
                <option value="May">May (05)</option>
                <option value="June">June (06)</option>
                <option value="July">July (07)</option>
                <option value="August">August (08)</option>
                <option value="September">September (09)</option>
                <option value="October">October (10)</option>
                <option value="November">November (11)</option>
                <option value="December">December (12)</option>
            </select>
            <!-- added options for the year from 2020 to 2024 -->
            <select name="cardyear" id="year">
                <option value="">Year</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
            </select>
            <label for="csc">CSC</label>
            <!-- make field required and added regex for csc -->
            <input type="text" id="csc" name="cardcsc" pattern="^\d{3}$" maxlength="3" max="999" required />
			<input type="submit" value="proceed to checkout" class="submit-btn"/>
			
        </fieldset>
    </form>
	</div>
</body>

</html>
