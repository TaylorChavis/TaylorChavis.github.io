<!DOCTYPE html>
<html lang = "en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Taylor's Validating WEB Template</title>
    
    <!--     
        Structure of HTML5 semantic layout swiped from PHP Fiddle and modified
        to include validing code and validation buttons and some other tweaks

        +===================================+
        |               header              |
        +===================================+
        |                 nav               |
        +=====================+=============+
        |                     |             |
        |       section       |    aside    |
        |
        +=====================+=============+    
        |          footer/tagline           |
        |         validation buttons        |
        +===================================+
        
        The code from Internet
        
        http://phpfiddle.org        
    -->
</head>

<body>
    <header>
            <h1>Welcome to Taylor's Awesome Webpage</h1>
            <h2>Where "average" is the new extravagant</h2>
    </header>
    <nav>
        <ul>
            <li><a href="#">This link leads to nowhere</a></li>
            <li><a href="#">This one does too</a></li>
        </ul>
    </nav>
    <footer> 
       vote igor 
       <br/>Designed by yours truly 
       <br/>
       <a href="http://validator.w3.org/check?uri=referer" style = "text-decoration: none">
          <img src="images/validation_button_html-blue.png" alt="Validate HTML" />
       </a>
       <!-- you may need to change the name of your image link to match the one you 
       uploaded -->
			 <a href="http://jigsaw.w3.org/css-validator/check/referer" style = "text-decoration: none">
         <img src="images/validation_button_css-blue.png" alt="Validate CSS" />
       </a>
    </footer>
</body>
</html>
